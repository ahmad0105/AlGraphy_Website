<!DOCTYPE html>
<!-- 
     AlGraphy Studio — Team Architecture (Employees Management)
     
     TABLE OF CONTENTS:
     1. ARCHITECTURE SETUP (Base href & Grid Layout)
     2. DYNAMIC SIDEBAR (Navigation Injection)
     3. TEAM ROSTER GRID (Dynamic Employee Cards)
     4. REGISTRATION MODALS (Add & Edit Architecture)
     5. JS ORCHESTRATION (EmployeeManager OOP & APIService)
-->
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Employees | AlGraphy Admin</title>

    <!-- External Resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/libs/fontawesome/css/all.min.css">

    <!-- Local Stylesheets -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/employees_manage.css">
    <link rel="stylesheet" href="/css/cursor.css">
</head>

<body>
    

    <main>
        <!-- Mini-Sidebar -->
        <div id="sidebar-placeholder"></div>

        <!-- Pure Management Workspace -->
        <section class="content">
            <div class="workspace-header premium-indicator">
                <div class="header-titles">
                    <h1>Employees</h1>
                    <p>Manage your studio's team and staff details</p>
                </div>

                <div class="header-actions-wrapper">
                    <div class="settings-card-inline">
                        <div class="inline-input-group">
                            <i class="fa fa-search" style="margin-left: 15px; color: var(--text-muted);"></i>
                            <input type="text" id="employeeSearchInput" placeholder="Filter by name or role...">
                        </div>
                    </div>
                    <button class="add-svc-btn" id="addNewEmployeeBtn">
                        <i class="fa fa-plus-circle"></i> ADD EMPLOYEE
                    </button>
                </div>
            </div>

            <div id="employees-admin-workspace" class="admin-grid-layout">
                <!-- Employees injected by JS -->
            </div>
        </section>

        <!-- Employee Add Modal -->
        <div id="addEmployeeModal" class="modal-overlay">
            <div class="modal-content">
                <button class="close-modal" id="closeAddModal">&times;</button>
                <h3 style="margin-bottom:20px;">Register New Employee</h3>
                <form id="addEmployeeForm" enctype="multipart/form-data">
                    <div class="modal-grid">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" name="full_name" placeholder="Name" required>
                        </div>
                        <div class="form-group">
                            <label>Role / Position</label>
                            <input type="text" name="role" placeholder="e.g. Creative Designer">
                        </div>
                        <div class="form-group">
                            <label>Contact Email</label>
                            <input type="email" name="email" placeholder="email@algraphy.com" required>
                        </div>
                        <div class="form-group">
                            <label>Hourly Rate ($/hr)</label>
                            <input type="number" step="0.01" name="hourly_rate" placeholder="50.00" value="25.00">
                        </div>
                        <div class="form-group">
                            <label>Joining Date</label>
                            <input type="date" name="joining_date" id="addEmpJoiningDate">
                        </div>
                        <div class="form-group">
                            <label>Profile Picture</label>
                            <input type="file" name="profile_pic" accept="image/*">
                        </div>
                    </div>
                    <button type="submit" class="save-btn">CREATE EMPLOYEE</button>
                    <div id="empAddStatus" style="margin-top: 15px; text-align: center;"></div>
                </form>
            </div>
        </div>

        <!-- Employee Edit Modal -->
        <div id="editEmployeeModal" class="modal-overlay">
            <div class="modal-content">
                <button class="close-modal" id="closeEmployeeModal">&times;</button>
                <h3 style="margin-bottom:20px;">Edit Employee Details</h3>
                <form id="editEmployeeForm" enctype="multipart/form-data">
                    <input type="hidden" name="id" id="editEmpId">

                    <div class="modal-grid">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" name="full_name" id="editEmpNameInput" required>
                        </div>
                        <div class="form-group">
                            <label>Role / Position</label>
                            <input type="text" name="role" id="editEmpRoleInput" placeholder="e.g. Developer">
                        </div>
                        <div class="form-group">
                            <label>Contact Email</label>
                            <input type="email" name="email" id="editEmpEmailInput">
                        </div>
                        <div class="form-group">
                            <label>Hourly Rate ($/hr)</label>
                            <input type="number" step="0.01" name="hourly_rate" id="editEmpRateInput"
                                placeholder="0.00">
                        </div>
                        <div class="form-group">
                            <label>Joining Date</label>
                            <input type="date" name="joining_date" id="editEmpJoiningDate">
                        </div>
                        <div class="form-group">
                            <label>Profile Picture</label>
                            <input type="file" name="profile_pic" id="editEmpPicInput" accept="image/*">
                        </div>
                    </div>

                    <button type="submit" class="save-btn">SAVE CHANGES</button>
                    <div id="empUpdateStatus" style="margin-top: 15px; text-align: center; color: var(--primary);">
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/ui-classes.js"></script>
    <script src="/js/api-service.js"></script>
    <script src="/js/BaseManager.js"></script>
    <script src="/js/employees_manage.js"></script>
    <script src="/js/sidebar-loader.js"></script>
    <script defer src="/js/cursor-loader.js"></script>
</body>

</html>
